<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:        #0d0d0d;
    --surface:   #161616;
    --border:    #2a2a2a;
    --accent:    #00e5a0;
    --accent-dim:#00a372;
    --text:      #e8e8e8;
    --text-dim:  #888;
    --user-bg:   #1a2a1a;
    --ai-bg:     #161616;
    --danger:    #ff4444;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* sidebar */
  #sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 0;
  }

  #sidebar-header {
    padding: 0 16px 16px;
    border-bottom: 1px solid var(--border);
  }

  #sidebar-header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #sidebar-header p {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  #new-chat-btn {
    margin: 12px 16px;
    padding: 8px 12px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  #new-chat-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  #sessions-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .session-item {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-left: 2px solid transparent;
    transition: all 0.1s;
  }
  .session-item:hover { color: var(--text); background: #1e1e1e; }
  .session-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: #0d1a0d;
  }

  /* status dot */
  #status-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  #status-dot.online  { background: var(--accent); }
  #status-dot.offline { background: var(--danger); }

  /* main chat area */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #session-label { color: var(--accent); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 720px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity:0; transform: translateY(6px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .message.user  { align-self: flex-end; align-items: flex-end; }
  .message.assistant { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .message.user      .msg-label { color: var(--accent-dim); }
  .message.assistant .msg-label { color: var(--text-dim); }

  .msg-bubble {
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .message.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid var(--accent-dim);
    color: var(--text);
  }
  .message.assistant .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    background: var(--ai-bg);
    border: 1px solid var(--border);
    width: fit-content;
  }
  .typing-dot {
    width: 6px; height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%,60%,100% { opacity: 0.2; transform: translateY(0); }
    30%         { opacity: 1;   transform: translateY(-4px); }
  }

  /* input area */
  #input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
  }

  #input-wrap {
    flex: 1;
    position: relative;
  }

  #message-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    resize: none;
    min-height: 48px;
    max-height: 160px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  #message-input:focus { border-color: var(--accent); }
  #message-input::placeholder { color: var(--text-dim); }

  #send-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    width: 48px;
    height: 48px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #send-btn:hover    { background: #00ffb3; }
  #send-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

  #char-count {
    position: absolute;
    bottom: 6px; right: 10px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
    pointer-events: none;
  }

  /* empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 8px;
  }
  #empty-state .icon { font-size: 32px; opacity: 0.3; }
  #empty-state p { font-size: 13px; font-family: 'IBM Plex Mono', monospace; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>Assistant</h1>
    <p>personal ai · local</p>
  </div>
  <button id="new-chat-btn" onclick="newSession()">+ new session</button>
  <div id="sessions-list"></div>
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">checking...</span>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="chat-header">
    <span>session: <span id="session-label">—</span></span>
    <span id="msg-count" style="color:var(--text-dim)"></span>
  </div>

  <div id="messages">
    <div id="empty-state">
      <div class="icon">◈</div>
      <p>start a new session to begin</p>
    </div>
  </div>

  <div id="input-area">
    <div id="input-wrap">
      <textarea
        id="message-input"
        placeholder="type a message... (enter to send, shift+enter for newline)"
        rows="1"
        maxlength="4000"
      ></textarea>
      <span id="char-count">0 / 4000</span>
    </div>
    <button id="send-btn" onclick="sendMessage()" disabled>↑</button>
  </div>
</div>

<script>
  let currentSession = null;
  let isWaiting      = false;

  // ── session management ─────────────────────────────────
  async function newSession() {
    const res  = await fetch('/session/new', { method: 'POST' });
    const data = await res.json();
    currentSession = data.session_id;
    clearMessages();
    updateSessionLabel();
    loadSessions();
    document.getElementById('send-btn').disabled = false;
    document.getElementById('message-input').focus();
  }

  async function loadSession(sessionId) {
    currentSession = sessionId;
    updateSessionLabel();
    clearMessages();
    document.getElementById('send-btn').disabled = false;

    const res  = await fetch(`/history/${sessionId}`);
    const data = await res.json();
    for (const msg of data.messages) {
      appendMessage(msg.role, msg.content, false);
    }
    scrollToBottom();

    // mark active
    document.querySelectorAll('.session-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === sessionId);
    });
  }

  async function loadSessions() {
    const res  = await fetch('/sessions');
    const data = await res.json();
    const list = document.getElementById('sessions-list');
    list.innerHTML = '';
    for (const sid of data.sessions) {
      const el       = document.createElement('div');
      el.className   = 'session-item' + (sid === currentSession ? ' active' : '');
      el.dataset.id  = sid;
      el.textContent = sid.slice(0, 8) + '…';
      el.title       = sid;
      el.onclick     = () => loadSession(sid);
      list.appendChild(el);
    }
  }

  function updateSessionLabel() {
    document.getElementById('session-label').textContent =
      currentSession ? currentSession.slice(0, 8) + '…' : '—';
  }

  // ── messaging ──────────────────────────────────────────
  async function sendMessage() {
    if (!currentSession || isWaiting) return;
    const input = document.getElementById('message-input');
    const text  = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    updateCharCount('');

    appendMessage('user', text);
    showTyping();
    isWaiting = true;
    document.getElementById('send-btn').disabled = true;

    try {
      const res  = await fetch('/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ session_id: currentSession, message: text })
      });
      const data = await res.json();
      hideTyping();
      appendMessage('assistant', data.reply);
    } catch (err) {
      hideTyping();
      appendMessage('assistant', '⚠ Could not reach the backend. Is the server running?');
    }

    isWaiting = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('message-input').focus();
    updateMsgCount();
  }

  function appendMessage(role, content, animate = true) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const msgs    = document.getElementById('messages');
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const label    = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'you' : 'assistant';

    const bubble    = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = content;

    if (!animate) wrapper.style.animation = 'none';

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    msgs.appendChild(wrapper);
    scrollToBottom();
  }

  let typingEl = null;
  function showTyping() {
    const msgs  = document.getElementById('messages');
    const wrap  = document.createElement('div');
    wrap.className = 'message assistant';
    wrap.id = 'typing-wrap';

    const label   = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'assistant';

    typingEl    = document.createElement('div');
    typingEl.className = 'typing-indicator';
    typingEl.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    wrap.appendChild(label);
    wrap.appendChild(typingEl);
    msgs.appendChild(wrap);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-wrap');
    if (el) el.remove();
  }

  function clearMessages() {
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
  }

  function scrollToBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function updateMsgCount() {
    const count = document.querySelectorAll('.message').length;
    document.getElementById('msg-count').textContent =
      count ? `${count} messages` : '';
  }

  // ── input handling ─────────────────────────────────────
  const input = document.getElementById('message-input');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', () => {
    autoResize(input);
    updateCharCount(input.value);
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function updateCharCount(val) {
    document.getElementById('char-count').textContent = `${val.length} / 4000`;
  }

  // ── health check ───────────────────────────────────────
  async function checkHealth() {
    try {
      const res  = await fetch('/health');
      const data = await res.json();
      const dot  = document.getElementById('status-dot');
      const txt  = document.getElementById('status-text');
      if (data.llm === 'ok') {
        dot.className = 'online';
        txt.textContent = 'llm online';
      } else {
        dot.className = 'offline';
        txt.textContent = 'llm offline';
      }
    } catch {
      document.getElementById('status-dot').className = 'offline';
      document.getElementById('status-text').textContent = 'api offline';
    }
  }

  // ── init ───────────────────────────────────────────────
  checkHealth();
  setInterval(checkHealth, 15000);
  loadSessions();
</script>
</body>
</html>
